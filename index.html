<title>PianoKids</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
body { font-family: -apple-system, sans-serif; background: #f5f4f0; min-height: 100vh; padding: 16px; }
.app { max-width: 820px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }

.subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
.song-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.song-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #ccc; font-size: 13px; cursor: pointer; background: white; color: #555; -webkit-appearance: none; }
.song-btn.active { background: #EEEDFE; border-color: #534AB7; color: #3C3489; font-weight: 600; }
.info-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.info-card { flex: 1; min-width: 90px; background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 8px 12px; }
.info-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.info-val { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.section { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 16px; margin-bottom: 14px; }
.section-title { font-size: 12px; color: #aaa; margin-bottom: 10px; }
.staff-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
svg.staff { display: block; min-width: 600px; height: 110px; }
.speed-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.speed-label { font-size: 13px; color: #555; font-weight: 600; }
.speed-btn { padding: 8px 18px; border-radius: 20px; border: 2px solid #ddd; font-size: 13px; cursor: pointer; background: white; color: #888; -webkit-appearance: none; font-weight: 500; }
.speed-btn.active { background: #534AB7; border-color: #534AB7; color: white; font-weight: 700; }
.main-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.btn-play { padding: 14px 28px; border-radius: 12px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; background: #534AB7; color: white; flex: 1; min-width: 130px; -webkit-appearance: none; }
.btn-play.paused { background: #0F6E56; }
.btn-play.finished { background: #aaa; }
.btn-secondary { padding: 14px 18px; border-radius: 12px; border: 1px solid #ddd; font-size: 14px; cursor: pointer; background: white; color: #333; -webkit-appearance: none; }
.btn-manual { padding: 10px 14px; border-radius: 9px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; background: white; color: #666; -webkit-appearance: none; }
.progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
.progress-fill { height: 100%; background: #534AB7; border-radius: 4px; transition: width 0.2s; }
.finished-msg { text-align: center; padding: 14px; font-size: 18px; font-weight: 700; color: #534AB7; display: none; }
.chord-box { margin-bottom: 14px; background: #EEEDFE; border: 1px solid #AFA9EC; border-radius: 10px; padding: 12px 16px; }
.chord-title { font-size: 11px; color: #888; margin-bottom: 8px; }
.chord-notes { display: flex; gap: 10px; flex-wrap: wrap; }
.chord-note { background: #534AB7; color: white; border-radius: 8px; padding: 6px 14px; font-size: 15px; font-weight: 700; }
.chord-note.black-note { background: #3C3489; }
.karaoke-box { background: #1a1a2e; border-radius: 12px; padding: 14px 20px; margin-bottom: 14px; min-height: 80px; display: none; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
.karaoke-line { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.karaoke-word { font-size: 19px; font-weight: 600; color: #444; padding: 2px 5px; border-radius: 4px; }
.karaoke-word.active { color: #fff; background: #534AB7; }
.karaoke-word.done { color: #666; }
.piano-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
.piano-3oct { position: relative; display: flex; height: 160px; min-width: 520px; }
.wkey { flex: 1; background: white; border: 1px solid #bbb; border-radius: 0 0 6px 6px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; position: relative; min-width: 18px; }
.wkey.highlight { background: #9FE1CB; border-color: #0F6E56; z-index: 1; }
.wkey.flash { background: #534AB7; border-color: #3C3489; z-index: 1; }
.wkey-label { font-size: 9px; color: #bbb; font-weight: 500; pointer-events: none; text-align: center; line-height: 1.2; }
.wkey.highlight .wkey-label { color: #085041; font-weight: 700; }
.wkey.flash .wkey-label { color: white; font-weight: 700; }
.oct-label { position: absolute; top: 4px; left: 2px; font-size: 8px; color: #ddd; }
.bkeys-layer { position: absolute; top: 0; left: 0; width: 100%; height: 96px; pointer-events: none; display: flex; }
.bslot { flex: 1; position: relative; min-width: 18px; }
.bkey { position: absolute; right: -35%; width: 70%; height: 100%; background: #222; border-radius: 0 0 4px 4px; z-index: 3; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
.bkey.highlight { background: #0F6E56; }
.bkey.flash { background: #534AB7; }
.bkey-label { font-size: 8px; color: #666; pointer-events: none; line-height: 1.2; text-align: center; }
.bkey.highlight .bkey-label { color: #9FE1CB; font-weight: 700; }
.bkey.flash .bkey-label { color: white; font-weight: 700; }
</style>
</head>

<div class="app">
<h1>Piano<span>Kids</span> 🎹</h1>
<p class="subtitle">Aprende a leer partituras y a tocar el piano</p>
<div class="song-selector" id="songSelector"></div>

<div class="info-card"><div class="info-label">Progreso</div><div class="info-val" id="infoProgress">—</div></div>
<div class="info-card"><div class="info-label">Dificultad</div><div class="info-val" id="infoDiff">—</div></div>
</div>
<div class="section">
<div class="section-title">Partitura — la nota morada es la que debes tocar ahora</div>
<div class="staff-container">
<svg class="staff" id="staffSvg" viewBox="0 0 720 110" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
</div>
<div class="karaoke-box" id="karaokeBox">
<div class="karaoke-line" id="karaokeLine1"></div>
<div class="karaoke-line" id="karaokeLine2"></div>
</div>
<div class="speed-bar">
<span class="speed-label">Velocidad:</span>
<button class="speed-btn" id="sp1" onclick="selectSpeed(0.5)">Muy lento</button>
<button class="speed-btn" id="sp2" onclick="selectSpeed(0.75)">Lento</button>
<button class="speed-btn active" id="sp3" onclick="selectSpeed(1)">Normal</button>
<button class="speed-btn" id="sp4" onclick="selectSpeed(1.5)">Rápido</button>
</div>
<div class="main-controls">
<button class="btn-play" id="btnPlay" onclick="togglePlay()">▶ Iniciar</button>
<button class="btn-secondary" onclick="resetSong()">⏮ Reiniciar</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:14px;">
<button class="btn-manual" onclick="prevNote()">⬅ Anterior</button>
<button class="btn-manual" onclick="nextNoteManual()">Siguiente ➡</button>
</div>
<div class="finished-msg" id="finishedMsg">🎉 ¡Bravo! Terminaste la canción</div>
<div class="section">
<div class="section-title">Teclado — 3 octavas (Do3 a Si5) — teclas verdes = tocar ahora</div>
<div class="chord-box">
<div class="chord-title">Toca estas notas:</div>
<div class="chord-notes" id="chordNotes"></div>
</div>
<div class="piano-wrap">
<div class="piano-3oct" id="piano3oct"></div>
</div>
</div>
</div>

function getNoteDuration(chord,bpm,speedMult){
var last=chord[chord.length-1];
var beats=last.d!==undefined?last.d:1;
return Math.round((60000/bpm*beats)/speedMult);
}
function getFreq(n,o){
var base={"Do":261.63,"Re":293.66,"Mi":329.63,"Fa":349.23,"Sol":392.00,"La":440.00,"Si":493.88,"Do#":277.18,"Re#":311.13,"Fa#":369.99,"Sol#":415.30,"La#":466.16}[n]||440;
return base*Math.pow(2,o-4);
}
var audioCtx=null;
function getAudioCtx(){
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
return audioCtx;
}
function playChord(chord){
try{
var ctx=getAudioCtx();
chord.forEach(function(nObj){
var freq=getFreq(nObj.n,nObj.o);
var osc=ctx.createOscillator();
var gain=ctx.createGain();
osc.connect(gain);gain.connect(ctx.destination);
osc.type="triangle";
osc.frequency.setValueAtTime(freq,ctx.currentTime);
gain.gain.setValueAtTime(0.25,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.8);
});
}catch(e){}
}

var currentSong=null,currentIdx=0,autoTimer=null,isPlaying=false,speedMult=1;

function init(){
var sel=document.getElementById("songSelector");
SONGS.forEach(function(s,i){
var btn=document.createElement("button");
btn.className="song-btn"+(i===0?" active":"");
btn.textContent=s.name;
btn.onclick=function(){loadSong(i);};
sel.appendChild(btn);
});
buildPiano();loadSong(0);
}

function buildPiano(){
var container=document.getElementById("piano3oct");
container.innerHTML="";
var bLayer=document.createElement("div");
bLayer.className="bkeys-layer";
[3,4,5].forEach(function(oct){
NOTES_IN_OCT.forEach(function(note,ni){
var wk=document.createElement("div");
wk.className="wkey";wk.id="wk_"+note+"_"+oct;
var lbl=document.createElement("span");
lbl.className="wkey-label";lbl.textContent=note+oct;
wk.appendChild(lbl);
if(ni===0){var od=document.createElement("span");od.className="oct-label";od.textContent="Oct"+oct;wk.appendChild(od);}
container.appendChild(wk);
var bs=document.createElement("div");bs.className="bslot";
if(BLACK_AFTER[note]){
var bk=document.createElement("div");bk.className="bkey";bk.id="bk_"+note+"s_"+oct;
var bl=document.createElement("span");bl.className="bkey-label";bl.textContent=note+"#"+oct;
bk.appendChild(bl);bs.appendChild(bk);
}
bLayer.appendChild(bs);
});
});
container.appendChild(bLayer);
}

function loadSong(idx){
document.querySelectorAll(".song-btn").forEach(function(b,i){b.classList.toggle("active",i===idx);});
currentSong=SONGS[idx];currentIdx=0;stopPlay();
document.getElementById("infoSong").textContent=currentSong.name;
document.getElementById("infoDiff").textContent=currentSong.difficulty;
document.getElementById("finishedMsg").style.display="none";
document.getElementById("btnPlay").textContent="▶ Iniciar";
document.getElementById("btnPlay").className="btn-play";
setupKaraoke();
renderState();
}

function getCurrentPhrase(noteIdx){
if(!currentSong.phrases||currentSong.phrases.length===0)return -1;
for(var i=0;i<currentSong.phrases.length;i++){
if(noteIdx>=currentSong.phrases[i].from&&noteIdx<=currentSong.phrases[i].to)return i;
}
return -1;
}

function setupKaraoke(){
var box=document.getElementById("karaokeBox");
if(!currentSong.phrases||currentSong.phrases.length===0){
box.style.display="none";return;
}
box.style.display="flex";
updateKaraoke(0);
}

function updateKaraoke(noteIdx){
if(!currentSong.phrases||currentSong.phrases.length===0)return;
var phraseIdx=getCurrentPhrase(noteIdx);
if(phraseIdx<0){
document.getElementById("karaokeLine1").innerHTML="";
document.getElementById("karaokeLine2").innerHTML="";
return;
}
var p1=currentSong.phrases[phraseIdx];
var p2=phraseIdx+1<currentSong.phrases.length?currentSong.phrases[phraseIdx+1]:null;
function renderLine(el,phrase,active){
el.innerHTML="";
if(!phrase)return;
phrase.words.forEach(function(w,wi){
var span=document.createElement("span");
var notePos=phrase.from+wi;
var cls="karaoke-word";
if(active&&notePos===noteIdx)cls+=" active";
else if(notePos<noteIdx)cls+=" done";
span.className=cls;
span.textContent=w;
el.appendChild(span);
});
}
renderLine(document.getElementById("karaokeLine1"),p1,true);
renderLine(document.getElementById("karaokeLine2"),p2,phraseIdx+1===getCurrentPhrase(noteIdx+1));
}

function selectSpeed(mult){
speedMult=mult;
document.querySelectorAll(".speed-btn").forEach(function(b){b.classList.remove("active");});
var map={"0.5":"sp1","0.75":"sp2","1":"sp3","1.5":"sp4"};
var key=String(mult);
if(map[key])document.getElementById(map[key]).classList.add("active");
if(isPlaying){stopPlay();startPlay();}
}

function togglePlay(){
if(isPlaying){pausePlay();}
else{if(currentIdx>=currentSong.notes.length-1)resetSong();startPlay();}
}
function startPlay(){
isPlaying=true;
document.getElementById("btnPlay").textContent="⏸ Pausar";
document.getElementById("btnPlay").className="btn-play paused";
playCurrentAndSchedule();
}
function playCurrentAndSchedule(){
if(!isPlaying)return;
renderState();
playChord(currentSong.notes[currentIdx]);
if(currentIdx>=currentSong.notes.length-1){finishSong();return;}
var dur=getNoteDuration(currentSong.notes[currentIdx],currentSong.bpm,speedMult);
autoTimer=setTimeout(function(){
if(!isPlaying)return;
currentIdx++;
playCurrentAndSchedule();
},dur);
}
function pausePlay(){
isPlaying=false;
if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
document.getElementById("btnPlay").textContent="▶ Continuar";
document.getElementById("btnPlay").className="btn-play";
}
function stopPlay(){
isPlaying=false;
if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
}
function finishSong(){
isPlaying=false;
document.getElementById("btnPlay").textContent="✓ Terminada";
document.getElementById("btnPlay").className="btn-play finished";
document.getElementById("finishedMsg").style.display="block";
}
function resetSong(){
stopPlay();currentIdx=0;
document.getElementById("finishedMsg").style.display="none";
document.getElementById("btnPlay").textContent="▶ Iniciar";
document.getElementById("btnPlay").className="btn-play";
setupKaraoke();
renderState();
}
function nextNoteManual(){
if(!currentSong)return;
if(currentIdx<currentSong.notes.length-1){currentIdx++;renderState();playChord(currentSong.notes[currentIdx]);}
}
function prevNote(){
if(currentIdx>0){currentIdx--;renderState();playChord(currentSong.notes[currentIdx]);}
}
function renderState(){
if(!currentSong)return;
var chord=currentSong.notes[currentIdx];
var total=currentSong.notes.length;
document.getElementById("infoNote").textContent=chord.map(function(n){return n.n+n.o;}).join("+");
document.getElementById("infoProgress").textContent=(currentIdx+1)+" / "+total;
document.getElementById("progressFill").style.width=Math.round((currentIdx+1)/total*100)+"%";
updateKaraoke(currentIdx);
renderChordBox(chord);
drawStaff(currentSong.notes,currentIdx);
highlightPiano(chord);
}
function renderChordBox(chord){
var box=document.getElementById("chordNotes");box.innerHTML="";
chord.forEach(function(nObj){
var pill=document.createElement("div");
pill.className="chord-note"+(nObj.n.indexOf("#")>-1?" black-note":"");
pill.textContent=nObj.n+nObj.o;
box.appendChild(pill);
});
}
function highlightPiano(chord){
document.querySelectorAll(".wkey").forEach(function(k){k.classList.remove("highlight","flash");});
document.querySelectorAll(".bkey").forEach(function(k){k.classList.remove("highlight","flash");});
chord.forEach(function(nObj){
var isSharp=nObj.n.indexOf("#")>-1;
if(isSharp){
var base=nObj.n.replace("#","");
var el=document.getElementById("bk_"+base+"s_"+nObj.o);
if(el){el.classList.add("highlight");setTimeout(function(){if(el){el.classList.add("flash");setTimeout(function(){el.classList.remove("flash");},300);}},50);}
}else{
var el2=document.getElementById("wk_"+nObj.n+"_"+nObj.o);
if(el2){el2.classList.add("highlight");setTimeout(function(){if(el2){el2.classList.add("flash");setTimeout(function(){el2.classList.remove("flash");},300);}},50);}
}
});
}
